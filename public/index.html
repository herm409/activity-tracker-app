<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="https://i.ibb.co/HL4BXffN/On-Par-logo.png" />
  <link rel="apple-touch-icon" href="https://i.ibb.co/HL4BXffN/On-Par-logo.png" />
  <link rel="mask-icon" href="https://i.ibb.co/HL4BXffN/On-Par-logo.png" color="#4f46e5" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description" content="OnPar Activity Tracker - Track your business activity, build streaks, compete with your team." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OnPar" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>OnPar Activity Tracker</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/service-worker.js')
          .then(function (reg) {
            console.log('[OnPar SW] Registered:', reg.scope);
          })
          .catch(function (err) {
            console.warn('[OnPar SW] Registration failed:', err);
          });
      });
    }
  </script>
</body>

</html>
